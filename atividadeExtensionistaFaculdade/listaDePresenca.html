    <h1>Caso queira deixar registrada a sua participação, preencha a lista abaixo:</h1>
    <div id="formulario">
         <form id="participation" action="https://formsubmit.co/lenaradeveloper@gmail.com" method="POST">
            <label for="nome">Nome:</label>
            <input type="text" id="nome" name="nome" required>
            <br><br>
            <label for="idade">Idade:</label>
            <input type="number" id="idade" name="idade" required>
            <br><br>
            <label for="email"> E-mail(opcional): </label>
       <input id="email" name="email" optional>
       <br><br>
            <button id="idButton" type="submit" id="clickButton">Enviar</button>
            </form>
    </div>
<div id="agradecimento" style="display:none;">
    <p>Obrigada pela sua participação!</p>
</div>
